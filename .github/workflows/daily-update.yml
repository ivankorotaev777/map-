name: Daily map update

on:
  schedule:
    # 01:00 UTC = 06:00 Tashkent (quietest hour for new listings)
        - cron: '17 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape joymee commercial rentals
        run: python scripts/scrape.py

      - name: Classify listings
        run: python scripts/classify.py

      - name: Fetch Uzum zones + delivery points
        run: python scripts/fetch_uzum.py

      - name: Build map
        run: python scripts/build_map.py

      - name: Copy output to index.html
        run: cp /tmp/joymee_uzum_map.html index.html

      - name: Commit and push if changed
        run: |
          if git diff --quiet index.html; then
            echo "✅ Map is unchanged today, nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "🤖 Auto-update map: $(date -u +%Y-%m-%d)"
            git push
            echo "✅ Pushed updated map"
          fi

      - name: Send Telegram digest
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/notify.py
